    .card-stat:hover{border-color:rgba(244,129,32,.3);box-shadow:var(--shadow)}

// ============================================================
//  FICO FACTOR DEFINITIONS
// ============================================================
const FICO=[
  {id:'payment',name:'Payment History',wt:35,icon:'📅',color:C.success,desc:'Pay all bills on time. Even one missed payment can significantly hurt your score.',tips:['Set up autopay for minimums','Pay before due date','1 late payment = -100+ points']},
  {id:'utilization',name:'Credit Utilization',wt:30,icon:'📊',color:C.info,desc:'Keep balances under 30% of limits. Under 10% is ideal for maximum score impact.',tips:['Under 30% is good','Under 10% is excellent','Pay before statement closes to lower reported balance']},
  {id:'length',name:'Credit History',wt:15,icon:'⏳',color:C.purple,desc:'Longer history is better. The average age of all your accounts matters.',tips:['Keep old accounts open','Don\'t close your oldest card','Patience is key — this improves naturally']},
  {id:'mix',name:'Credit Mix',wt:10,icon:'🎯',color:'#ec4899',desc:'Having different credit types (revolving + installment) shows responsible management.',tips:['Mix revolving & installment credit','Quality over quantity']},
  {id:'inquiries',name:'New Credit',wt:10,icon:'🔍',color:C.warning,desc:'Too many hard inquiries in a short period signals risk to lenders.',tips:['Limit applications to 1-2 per year','Hard inquiries stay on report for 2 years','Rate-shopping for mortgages counts as 1']},
];

// ============================================================
//  UTILS
// ============================================================
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const fmtD=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
const fmtFull=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const daysB=(a,b)=>Math.round((b-a)/864e5);
const fmt$=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=n=>n>=1000?`$${(n/1000).toFixed(0)}k`:`$${n}`;

// Calculate billing cycle details
const calcCycle=(cd,dd)=>{
  const t=new Date(TODAY);
  let lc=new Date(t.getFullYear(),t.getMonth(),cd);if(lc>t)lc.setMonth(lc.getMonth()-1);
  let nc=new Date(t.getFullYear(),t.getMonth(),cd);if(nc<=t)nc.setMonth(nc.getMonth()+1);
  let due=new Date(lc.getFullYear(),lc.getMonth(),dd);if(due<=lc)due.setMonth(due.getMonth()+1);if(due<t)due.setMonth(due.getMonth()+1);
  const op=addD(lc,1),opt=addD(due,-2);
  const so=daysB(op,t),uc=daysB(t,nc),ud=daysB(t,due),uo=daysB(t,opt);
  const gr=daysB(lc,due),fu=Math.max(0,daysB(lc,t)),cl=daysB(op,nc);
  // bestBuy: 1-5 days after statement close = maximum float window
  const bestBuyStart=addD(lc,1),bestBuyEnd=addD(lc,5);
  const inBestWindow=t>=bestBuyStart&&t<=bestBuyEnd;
  return{op,lc,nc,due,opt,so,uc,ud,uo,gr,fu,mf:gr+cl,cl,fst:ud,fnc:uc+gr,over:ud<0,danger:ud>=0&&ud<=2,warn:ud>2&&ud<=5,bestBuyStart,bestBuyEnd,inBestWindow,maxFloat:gr+cl};
};

// Effective APY from daily compounding: (1 + APR/365)^365 - 1
const aprToApy=apr=>((Math.pow(1+(apr/100/365),365)-1)*100).toFixed(2);

// Estimated yearly interest if carrying vs paying full
const calcYearlySavings=(bal,apr)=>bal*(apr/100);

const CreditCard=({type,last,name='CARDHOLDER',sz='md',full=false})=>{
  const c=CARDS[type]||CARDS.chase_sapphire_preferred;
  const sc=sz==='sm'?.55:sz==='xs'?.35:1;
  const w=320*sc,h=200*sc;
  const IssuerLogo=()=>{
    const s=sz==='sm'?.7:sz==='xs'?.5:1;
    switch(c.issuer){
      case'chase':return<ChaseLogo c={c.tc} w={26*s}/>;

const SpendOptimizer=({cards})=>{
  const[amt,setAmt]=useState('');

      cy:calcCycle(c.cd,c.dd),
      potentialSave: parseFloat(amt)*(c.apr/100/365)*calcCycle(c.cd,c.dd).fst,
    })).sort((a,b)=>b.cy.fst-a.cy.fst);

  const getBestDayAdvice=(c)=>{

    </div>}

    {/* Input */}
    <div className="section-card">
      <label style={{fontSize:13,fontWeight:600,color:C.dark,display:'block',marginBottom:10}}>Purchase Amount</label>
      <div style={{position:'relative',marginBottom:0}}>

const InterestPage=({cards})=>{
  const[principal,setPrincipal]=useState('5000');
  const[apr,setApr]=useState('21.99');
  const[months,setMonths]=useState('12');
  const chartRef=useRef(null);
  const chartInstance=useRef(null);

  const calc=useMemo(()=>{
    const p=parseFloat(principal)||0;
    const r=parseFloat(apr)||0;
    const m=parseInt(months)||12;
    const dailyRate=r/100/365;
    const apy=((Math.pow(1+dailyRate,365)-1)*100);
    const monthlyRate=r/100/12;
    // Compound growth over months
    const growth=Array.from({length:m+1},(_,i)=>({
      month:i,
      simple:p*(1+(r/100/12)*i),
      compound:p*Math.pow(1+monthlyRate,i),
    }));
    const totalInterestSimple=growth[m].simple-p;
    const totalInterestCompound=growth[m].compound-p;
    return{apy,growth,totalInterestSimple,totalInterestCompound,monthlyPayment:(p*monthlyRate)/(1-Math.pow(1+monthlyRate,-m))};
  },[principal,apr,months]);

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInstance.current)chartInstance.current.destroy();
    const labels=calc.growth.map(g=>`Mo ${g.month}`);
    chartInstance.current=new Chart(chartRef.current,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'With Daily Compounding',data:calc.growth.map(g=>g.compound.toFixed(2)),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2},
          {label:'Simple Interest',data:calc.growth.map(g=>g.simple.toFixed(2)),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.05)',fill:true,tension:.4,pointRadius:0,borderWidth:2,borderDash:[5,5]},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:12}}},tooltip:{mode:'index',intersect:false}},
        scales:{
          y:{ticks:{callback:v=>`$${v>=1000?(v/1000).toFixed(1)+'k':v}`},grid:{color:'rgba(0,0,0,.05)'}},
          x:{ticks:{maxTicksLimit:8},grid:{display:false}},
        }
      }
    });
    return()=>{if(chartInstance.current)chartInstance.current.destroy()};
  },[calc]);

  return<div className="fade-in">
    <PageHead t="Interest & APY" s="Understand the true cost of carrying a balance"/>
    <div className="grid-2" style={{marginBottom:20,gap:20}}>
      {/* Calculator inputs */}
      <div className="section-card" style={{padding:24}}>
        <h3 style={{fontSize:15,fontWeight:700,color:C.dark,marginBottom:18}}>🧮 Interest Calculator</h3>
        {[
          {label:'Balance / Principal ($)',val:principal,set:setPrincipal,type:'number',ph:'5000'},
          {label:'APR (%)',val:apr,set:setApr,type:'number',ph:'21.99',step:'.01'},
          {label:'Time Period (months)',val:months,set:setMonths,type:'number',ph:'12'},
        ].map((f,i)=><div key={i} style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:600,color:C.dark,display:'block',marginBottom:6}}>{f.label}</label>
          <input type={f.type} step={f.step} className="inp" value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}/>
        </div>)}
        <div style={{background:C.dangerLight,border:`1px solid ${C.danger}`,borderRadius:12,padding:14,marginTop:4}}>
          <div style={{fontSize:11,color:C.danger,fontWeight:600,marginBottom:4}}>⚠️ True Cost of Carrying Balance</div>
          <div style={{fontSize:13,color:C.text}}>APR <strong>{apr}%</strong> → Effective APY <strong style={{color:C.danger}}>{calc.apy.toFixed(2)}%</strong> (daily compounding)</div>
        </div>
      </div>

      {/* Result stats */}
      <div>
        {[
          {icon:'📈',label:'Effective APY',value:`${calc.apy.toFixed(2)}%`,sub:'With daily compounding',color:C.danger},
          {icon:'💸',label:`Interest over ${months}mo`,value:`$${calc.totalInterestCompound.toFixed(2)}`,sub:'With daily compounding',color:C.danger},
          {icon:'📉',label:'Simple interest',value:`$${calc.totalInterestSimple.toFixed(2)}`,sub:'Without compounding',color:C.warning},
          {icon:'💳',label:'Min monthly payment',value:`$${calc.monthlyPayment.toFixed(2)}`,sub:'To pay off in full',color:C.success},
        ].map((s,i)=><div key={i} className="section-card card-hover" style={{display:'flex',alignItems:'center',gap:14,padding:14,marginBottom:10,margin:'0 0 10px'}}>
          <div style={{fontSize:28}}>{s.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:C.muted}}>{s.label}</div>
            <div style={{fontSize:11,color:C.muted}}>{s.sub}</div>
          </div>
          <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.value}</div>
        </div>)}
      </div>
    </div>

    {/* Chart */}
    <div className="section-card">
      <h3 style={{fontSize:15,fontWeight:700,color:C.dark,marginBottom:16}}>📊 Balance Growth Over Time</h3>
      <div style={{height:280}}>
        <canvas ref={chartRef}/>

      <div style={{display:'flex',gap:20,marginTop:12,justifyContent:'center',flexWrap:'wrap'}}>
        <div style={{fontSize:12,color:C.muted}}>🔴 Daily compounding costs <strong style={{color:C.danger}}>${(calc.totalInterestCompound-calc.totalInterestSimple).toFixed(2)} more</strong> than simple interest</div>

    {/* Your cards APR table */}
    <div className="section-card" style={{marginTop:20}}>

const FicoPage=({cards,fico})=>{
  const[exp,setExp]=useState(null);
  const sc=useMemo(()=>{
    const tl=cards.reduce((s,c)=>s+c.limit,0);
    const tb=cards.reduce((s,c)=>s+c.bal,0);
    const ut=tl?(tb/tl)*100:0;
    const aa=cards.reduce((s,c)=>{const o=new Date(c.opened||'2020-01-01');return s+(TODAY-o)/(365.25*864e5);},0)/Math.max(cards.length,1);
    const hod=cards.some(c=>calcCycle(c.cd,c.dd).over);
    return{
      payment:{s:hod?40:95,st:hod?'poor':'excellent'},
      utilization:{s:ut<=10?98:ut<=30?85:ut<=50?60:40,st:ut<=10?'excellent':ut<=30?'good':ut<=50?'fair':'poor',v:ut},
      length:{s:aa>=7?95:aa>=5?80:aa>=3?65:50,st:aa>=5?'excellent':aa>=3?'good':'fair',v:aa},

const Timeline=({cards})=>{
  const evts=[];
  cards.forEach(c=>{
    const cy=calcCycle(c.cd,c.dd);
    const d=CARDS[c.cardType];
    evts.push(
      {dt:cy.nc,t:'close',n:d.name,last:c.last,cl:C.purple,bg:C.purpleLight,icon:'📕'},
      {dt:cy.bestBuyStart,t:'opt',n:d.name,last:c.last,cl:C.success,bg:C.successLight,icon:'⭐'},
      {dt:cy.due,t:'due',n:d.name,last:c.last,cl:C.danger,bg:C.dangerLight,icon:'💸'},
    );
  });
  evts.sort((a,b)=>a.dt-b.dt);
  return<div className="fade-in">
    <PageHead t="Timeline" s="Upcoming payment dates and key events"/>
    <div className="section-card">

const buildMonthlyHistory=(txList)=>{
  const map={};
  const now=new Date(TODAY);
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    map[key]=0;
  }
  txList.forEach(tx=>{const k=tx.date.slice(0,7);if(map[k]!==undefined)map[k]+=tx.amount;});
  return Object.values(map);
};

// Auto-categorize merchant names
const autoCategory=(merchant)=>{
  const m=merchant.toLowerCase();
  if(/uber\s?eats|doordash|grubhub|chipotle|starbucks|mcdonald|wendy|burger|pizza|restaurant|cafe|coffee|food|grocery|whole foods|trader joe|kroger|safeway|publix/i.test(m))return'Food';
  if(/amazon|walmart|target|costco|best buy|apple store|nike|macys|nordstrom|gap|zara|shop/i.test(m))return'Shopping';
  if(/delta|united|american air|southwest|airbnb|marriott|hilton|hotel|flight|airline|travel|expedia|booking/i.test(m))return'Travel';
  if(/netflix|hulu|spotify|disney|hbo|youtube|apple music|gaming|movie|theater|concert|ticket/i.test(m))return'Entertainment';
  if(/shell|exxon|chevron|bp|gas|uber|lyft|taxi|parking|transit|metro/i.test(m))return'Transport';
  if(/cvs|walgreens|pharmacy|doctor|hospital|medical|gym|fitness|health/i.test(m))return'Health';
  if(/electric|water|internet|phone|t-mobile|verizon|att|comcast|utility|insurance|rent/i.test(m))return'Bills';
  return'Other';
};

// CSV Import Modal
const CSVImportModal=({onClose,onImport,cards})=>{
  const[csvData,setCsvData]=useState('');
  const[parsed,setParsed]=useState([]);
  const[mapping,setMapping]=useState({date:0,amount:1,merchant:2,category:-1});
  const[preview,setPreview]=useState([]);
  const[step,setStep]=useState(1); // 1=upload, 2=map columns, 3=preview
  const[defaultCard,setDefaultCard]=useState(cards[0]?.id||'');
  const fileRef=useRef(null);

  const parseCSV=(text)=>{
    const lines=text.trim().split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
    return lines;
  };

  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const text=ev.target.result;
      setCsvData(text);
      const lines=parseCSV(text);
      setParsed(lines);
      setStep(2);
    };
    reader.readAsText(file);
  };

  const handlePaste=(e)=>{
    const text=e.target.value;
    setCsvData(text);
    if(text.includes(',')){
      const lines=parseCSV(text);
      setParsed(lines);
    }
  };

  const processMapping=()=>{
    const rows=parsed.slice(1); // skip header
    const txs=rows.map((row,i)=>{
      const merchant=row[mapping.merchant]||'Unknown';
      const cat=mapping.category>=0?row[mapping.category]:autoCategory(merchant);
      return{
        id:'csv'+Date.now()+i,
        date:row[mapping.date]||TODAY.toISOString().slice(0,10),
        amount:parseFloat(row[mapping.amount]?.replace(/[$,]/g,''))||0,
        merchant,
        category:CATEGORIES.includes(cat)?cat:autoCategory(merchant),
        cardId:defaultCard,
        note:'Imported from CSV'
      };
    }).filter(t=>t.amount>0);
    setPreview(txs);
    setStep(3);
  };

  const confirmImport=()=>{
    onImport(preview);
    onClose();
  };

  return<div className="modal-overlay" onClick={onClose}>
    <div className="modal-box" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800,color:C.dark}}>📄 Import from CSV</h2>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.muted}}>✕</button>
      </div>

      {/* Step indicator */}
      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {['Upload','Map Columns','Preview'].map((s,i)=><div key={i} style={{flex:1,textAlign:'center'}}>
          <div style={{width:28,height:28,borderRadius:14,background:step>i?C.primary:step===i+1?C.primaryLight:C.bg,color:step>i?'#fff':step===i+1?C.primary:C.muted,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,marginBottom:4}}>{step>i?'✓':i+1}</div>
          <div style={{fontSize:11,color:step===i+1?C.primary:C.muted,fontWeight:step===i+1?600:400}}>{s}</div>
        </div>)}
      </div>

      {step===1&&<div>
        <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:40,textAlign:'center',marginBottom:16,cursor:'pointer',transition:'all .2s'}} onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFile} style={{display:'none'}}/>
          <div style={{fontSize:48,marginBottom:12}}>📁</div>
          <div style={{fontWeight:600,color:C.dark,marginBottom:4}}>Drop CSV file here or click to browse</div>
          <div style={{fontSize:13,color:C.muted}}>Supports Chase, Amex, Capital One, and most bank exports</div>
        </div>
        <div style={{textAlign:'center',color:C.muted,fontSize:13,marginBottom:12}}>— or paste CSV data —</div>
        <textarea className="inp" placeholder="Date,Amount,Description&#10;2025-04-01,45.99,Amazon&#10;2025-04-02,12.50,Starbucks" value={csvData} onChange={handlePaste} style={{minHeight:100,fontFamily:'monospace',fontSize:12}}/>
        {csvData&&<button className="btn-primary" onClick={()=>{const lines=parseCSV(csvData);setParsed(lines);setStep(2);}} style={{width:'100%',marginTop:12}}>Continue →</button>}
      </div>}

      {step===2&&<div>
        <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Map your CSV columns to transaction fields:</div>
        <div style={{background:C.bg,borderRadius:12,padding:12,marginBottom:16,fontFamily:'monospace',fontSize:11,overflow:'auto'}}>
          <div style={{color:C.muted,marginBottom:4}}>Header row:</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{parsed[0]?.map((h,i)=><span key={i} style={{background:C.surface,padding:'4px 8px',borderRadius:6,border:`1px solid ${C.border}`}}>{i}: {h}</span>)}</div>
        </div>
        <div className="grid-2" style={{gap:12,marginBottom:16}}>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Date Column *</label><select className="inp" value={mapping.date} onChange={e=>setMapping({...mapping,date:+e.target.value})}>{parsed[0]?.map((h,i)=><option key={i} value={i}>{i}: {h}</option>)}</select></div>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Amount Column *</label><select className="inp" value={mapping.amount} onChange={e=>setMapping({...mapping,amount:+e.target.value})}>{parsed[0]?.map((h,i)=><option key={i} value={i}>{i}: {h}</option>)}</select></div>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Merchant/Description *</label><select className="inp" value={mapping.merchant} onChange={e=>setMapping({...mapping,merchant:+e.target.value})}>{parsed[0]?.map((h,i)=><option key={i} value={i}>{i}: {h}</option>)}</select></div>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Category (optional)</label><select className="inp" value={mapping.category} onChange={e=>setMapping({...mapping,category:+e.target.value})}><option value={-1}>Auto-detect</option>{parsed[0]?.map((h,i)=><option key={i} value={i}>{i}: {h}</option>)}</select></div>
          <div style={{gridColumn:'1/-1'}}><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Default Card</label><select className="inp" value={defaultCard} onChange={e=>setDefaultCard(e.target.value)}>{cards.map(c=><option key={c.id} value={c.id}>{CARDS[c.cardType]?.name} ••{c.last}</option>)}</select></div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-ghost" onClick={()=>setStep(1)} style={{flex:1}}>← Back</button>
          <button className="btn-primary" onClick={processMapping} style={{flex:2}}>Preview Import →</button>
        </div>
      </div>}

      {step===3&&<div>
        <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Found <strong style={{color:C.primary}}>{preview.length}</strong> transactions to import:</div>
        <div style={{maxHeight:300,overflow:'auto',border:`1px solid ${C.border}`,borderRadius:12,marginBottom:16}}>
          {preview.slice(0,10).map((tx,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:18}}>{CAT_ICONS[tx.category]||'📦'}</span>
            <div style={{flex:1}}><div style={{fontWeight:600,color:C.dark,fontSize:13}}>{tx.merchant}</div><div style={{fontSize:11,color:C.muted}}>{tx.date} · {tx.category}</div></div>
            <div style={{fontWeight:700,color:C.dark}}>${tx.amount.toFixed(2)}</div>
          </div>)}
          {preview.length>10&&<div style={{padding:12,textAlign:'center',color:C.muted,fontSize:12}}>...and {preview.length-10} more</div>}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-ghost" onClick={()=>setStep(2)} style={{flex:1}}>← Back</button>
          <button className="btn-primary" onClick={confirmImport} style={{flex:2}}>Import {preview.length} Transactions</button>

  </div>;
};

// Receipt Scanner Modal
const ReceiptScannerModal=({onClose,onAdd,cards})=>{
  const[step,setStep]=useState(1); // 1=capture, 2=processing, 3=confirm
  const[imageData,setImageData]=useState(null);
  const[extracted,setExtracted]=useState({merchant:'',amount:'',date:TODAY.toISOString().slice(0,10),category:'Other',items:[]});
  const[selectedCard,setSelectedCard]=useState(cards[0]?.id||'');
  const fileRef=useRef(null);
  const videoRef=useRef(null);
  const[useCamera,setUseCamera]=useState(false);
  const[stream,setStream]=useState(null);

  // Simulated OCR extraction (in real app, would use Tesseract.js or cloud OCR)
  const simulateOCR=(img)=>{
    setStep(2);
    // Simulate processing delay
    setTimeout(()=>{
      // Mock extracted data - in real app this would come from OCR
      const mockResults=[
        {merchant:'Whole Foods Market',amount:67.43,items:['Organic Milk $5.99','Avocados $4.50','Chicken Breast $12.99','Mixed Greens $6.95','Bread $4.50','Coffee Beans $14.99','Misc Items $17.51']},
        {merchant:'Target',amount:124.87,items:['Home Supplies $45.99','Clothing $38.88','Snacks $18.50','Electronics $21.50']},
        {merchant:'Starbucks',amount:8.45,items:['Grande Latte $6.45','Croissant $2.00']},
        {merchant:'Shell Gas Station',amount:52.30,items:['Regular Unleaded 12.5 gal']},
        {merchant:'Amazon',amount:89.99,items:['Wireless Headphones $89.99']},
      ];
      const result=mockResults[Math.floor(Math.random()*mockResults.length)];
      setExtracted({
        merchant:result.merchant,
        amount:result.amount,
        date:TODAY.toISOString().slice(0,10),
        category:autoCategory(result.merchant),
        items:result.items
      });
      setStep(3);
    },2000);
  };

  const handleFileUpload=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      setImageData(ev.target.result);
      simulateOCR(ev.target.result);
    };
    reader.readAsDataURL(file);
  };

  const startCamera=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      setStream(s);
      setUseCamera(true);
      setTimeout(()=>{if(videoRef.current)videoRef.current.srcObject=s;},100);
    }catch(err){
      alert('Camera access denied. Please use file upload instead.');
    }
  };

  const capturePhoto=()=>{
    const video=videoRef.current;
    const canvas=document.createElement('canvas');
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const data=canvas.toDataURL('image/jpeg');
    setImageData(data);
    stream?.getTracks().forEach(t=>t.stop());
    setUseCamera(false);
    simulateOCR(data);
  };

  const confirmReceipt=()=>{
    const tx={
      id:'r'+Date.now(),
      date:extracted.date,
      amount:parseFloat(extracted.amount)||0,
      merchant:extracted.merchant,
      category:extracted.category,
      cardId:selectedCard,
      note:`Scanned receipt: ${extracted.items.length} items`
    };
    onAdd(tx);
    onClose();
  };

  useEffect(()=>{
    return()=>{stream?.getTracks().forEach(t=>t.stop());};
  },[stream]);

  return<div className="modal-overlay" onClick={onClose}>
    <div className="modal-box" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800,color:C.dark}}>📸 Scan Receipt</h2>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.muted}}>✕</button>
      </div>

      {step===1&&<div>
        {!useCamera?<>
          <div style={{border:`2px dashed ${C.border}`,borderRadius:16,padding:40,textAlign:'center',marginBottom:16,cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFileUpload} style={{display:'none'}}/>
            <div style={{fontSize:56,marginBottom:12}}>🧾</div>
            <div style={{fontWeight:600,color:C.dark,marginBottom:4}}>Upload Receipt Photo</div>
            <div style={{fontSize:13,color:C.muted}}>Take a photo or choose from gallery</div>
          </div>
          <div style={{textAlign:'center',marginBottom:16}}><span style={{color:C.muted,fontSize:13}}>— or —</span></div>
          <button className="btn-ghost" onClick={startCamera} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span style={{fontSize:18}}>📷</span> Use Camera
          </button>
        </>:<>
          <div style={{borderRadius:16,overflow:'hidden',marginBottom:16,background:'#000'}}>
            <video ref={videoRef} autoPlay playsInline style={{width:'100%',display:'block'}}/>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-ghost" onClick={()=>{stream?.getTracks().forEach(t=>t.stop());setUseCamera(false);}} style={{flex:1}}>Cancel</button>
            <button className="btn-primary" onClick={capturePhoto} style={{flex:2}}>📸 Capture</button>
          </div>
        </>}
      </div>}

      {step===2&&<div style={{textAlign:'center',padding:40}}>
        <div style={{width:60,height:60,borderRadius:30,border:`3px solid ${C.primary}`,borderTopColor:'transparent',margin:'0 auto 20px',animation:'spin 1s linear infinite'}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{fontWeight:600,color:C.dark,marginBottom:8}}>Scanning Receipt...</div>
        <div style={{fontSize:13,color:C.muted}}>Extracting merchant, items, and total</div>
        {imageData&&<img src={imageData} style={{width:120,height:120,objectFit:'cover',borderRadius:12,marginTop:20,opacity:.5}}/>}
      </div>}

      {step===3&&<div>
        <div style={{background:C.successLight,border:`1px solid ${C.success}`,borderRadius:12,padding:14,marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:24}}>✅</span>
          <div><div style={{fontWeight:600,color:C.success}}>Receipt Scanned!</div><div style={{fontSize:12,color:C.text}}>Review and confirm the details below</div></div>
        </div>

        {imageData&&<div style={{marginBottom:16,textAlign:'center'}}><img src={imageData} style={{maxWidth:150,maxHeight:150,objectFit:'cover',borderRadius:12,border:`1px solid ${C.border}`}}/></div>}

        <div style={{background:C.bg,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div><div style={{fontSize:11,color:C.muted}}>Merchant</div><input className="inp" value={extracted.merchant} onChange={e=>setExtracted({...extracted,merchant:e.target.value,category:autoCategory(e.target.value)})} style={{marginTop:4,fontWeight:600}}/></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:11,color:C.muted}}>Total</div><input className="inp" type="number" value={extracted.amount} onChange={e=>setExtracted({...extracted,amount:e.target.value})} style={{marginTop:4,fontWeight:700,fontSize:20,width:100,textAlign:'right'}}/></div>
          </div>
          <div className="grid-2" style={{gap:12}}>
            <div><label style={{fontSize:11,color:C.muted}}>Date</label><input type="date" className="inp" value={extracted.date} onChange={e=>setExtracted({...extracted,date:e.target.value})} style={{marginTop:4}}/></div>
            <div><label style={{fontSize:11,color:C.muted}}>Category</label><select className="inp" value={extracted.category} onChange={e=>setExtracted({...extracted,category:e.target.value})} style={{marginTop:4}}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={{gridColumn:'1/-1'}}><label style={{fontSize:11,color:C.muted}}>Card</label><select className="inp" value={selectedCard} onChange={e=>setSelectedCard(e.target.value)} style={{marginTop:4}}>{cards.map(c=><option key={c.id} value={c.id}>{CARDS[c.cardType]?.name} ••{c.last}</option>)}</select></div>
          </div>
        </div>

        {extracted.items.length>0&&<div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:8}}>Items Detected:</div>
          <div style={{background:C.bg,borderRadius:10,padding:10,maxHeight:120,overflow:'auto'}}>
            {extracted.items.map((item,i)=><div key={i} style={{fontSize:12,color:C.text,padding:'4px 0',borderBottom:i<extracted.items.length-1?`1px solid ${C.border}`:'none'}}>{item}</div>)}
          </div>
        </div>}

        <div style={{display:'flex',gap:10}}>
          <button className="btn-ghost" onClick={()=>{setStep(1);setImageData(null);}} style={{flex:1}}>Rescan</button>
          <button className="btn-primary" onClick={confirmReceipt} style={{flex:2}}>Add ${parseFloat(extracted.amount).toFixed(2)} Transaction</button>
        </div>
      </div>}
    </div>
  </div>;
};

const SpendingPlanner=({cards,setTab})=>{
  const[transactions,setTransactions]=useState(DEMO_TX);
  const[budgets,setBudgets]=useState({...DEFAULT_BUDGETS});
  const[showAdd,setShowAdd]=useState(false);

  const currentMonthKey=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const filteredTx=useMemo(()=>activeMonth==='current'?transactions.filter(t=>t.date.startsWith(currentMonthKey)):transactions,[transactions,activeMonth,currentMonthKey]);
  const totalSpent=useMemo(()=>filteredTx.reduce((s,t)=>s+t.amount,0),[filteredTx]);
  const totalBudget=useMemo(()=>Object.values(budgets).reduce((s,v)=>s+v,0),[budgets]);
  const catSpend=useMemo(()=>{const m={};filteredTx.forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[filteredTx]);
  const monthlyData=useMemo(()=>buildMonthlyHistory(transactions),[transactions]);
  
  const handleAddTx=(tx)=>{setTransactions(prev=>[tx,...prev]);setExpandTx(true);};
  const handleImportCSV=(txs)=>{setTransactions(prev=>[...txs,...prev]);setExpandTx(true);};

  const getFloatImpact=(tx)=>{const card=cards.find(c=>c.id===tx.cardId);if(!card)return null;const cy=calcCycle(card.cd,card.dd);const txDate=new Date(tx.date);const daysAfterClose=daysB(cy.lc,txDate);if(daysAfterClose>=1&&daysAfterClose<=5)return{days:cy.fst,label:`+${cy.fst}d float (optimal!)`,color:C.success};if(daysAfterClose>5)return{days:cy.fst,label:`${cy.fst}d float`,color:C.info};return{days:cy.fst,label:`${cy.fst}d float`,color:C.warning};};
  const moneySaved=useMemo(()=>{let saved=0;filteredTx.forEach(tx=>{const card=cards.find(c=>c.id===tx.cardId);if(!card)return;const cy=calcCycle(card.cd,card.dd);saved+=tx.amount*(card.apr/100/365)*cy.fst;});return saved;},[filteredTx,cards]);
  const bestCard=useMemo(()=>{if(!cards.length)return null;return cards.map(c=>({...c,cy:calcCycle(c.cd,c.dd)})).sort((a,b)=>b.cy.fst-a.cy.fst)[0];},[cards]);
  const avg6Month=monthlyData.reduce((s,v)=>s+v,0)/6;

  return<div className="fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24,flexWrap:'wrap',gap:12}}>
      <div><h1 style={{fontSize:28,fontWeight:800,color:C.dark,letterSpacing:'-0.02em'}}>Spending Planner</h1><p style={{fontSize:14,color:C.muted,marginTop:4}}>Track spending, set budgets, and maximize your float</p></div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn-ghost" onClick={()=>setShowCSV(true)} style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px'}}><span>📄</span> Import CSV</button>
        <button className="btn-ghost" onClick={()=>setShowScanner(true)} style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px'}}><span>📸</span> Scan Receipt</button>
        <button className="btn-primary" onClick={()=>setShowAdd(true)} style={{display:'flex',alignItems:'center',gap:6,padding:'10px 20px'}}><span style={{fontSize:16}}>+</span> Add Manual</button>
      </div>
    </div>

    {/* Quick Add Section */}
    <QuickAdd cards={cards} onAdd={handleAddTx}/>

    {bestCard&&<div style={{background:'linear-gradient(135deg,rgba(59,130,246,.1),rgba(59,130,246,.05))',border:`1px solid ${C.info}`,borderRadius:16,padding:18,marginBottom:20,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
      <span style={{fontSize:28}}>💡</span>
      <div style={{flex:1}}><div style={{fontWeight:600,color:C.info,marginBottom:2}}>Float Tip</div><div style={{fontSize:13,color:C.text}}>Use <strong>{CARDS[bestCard.cardType]?.name}</strong> for big purchases right after statement closes for <strong>{bestCard.cy.maxFloat} days</strong> interest-free!</div></div>
      <button className="btn-ghost" style={{fontSize:12}} onClick={()=>setTab('optimizer')}>🎯 Optimize →</button>
    </div>}

    <div style={{display:'flex',gap:8,marginBottom:20}}>
      {[{k:'current',l:`${NOW_MONTH} Only`},{k:'all',l:'All Time'}].map(m=><button key={m.k} onClick={()=>setActiveMonth(m.k)} style={{padding:'8px 18px',borderRadius:24,border:`1px solid ${activeMonth===m.k?C.primary:C.border}`,background:activeMonth===m.k?C.primaryLight:'transparent',color:activeMonth===m.k?C.primary:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s'}}>{m.l}</button>)}
    </div>

    <div className="section-card" style={{background:'linear-gradient(135deg,#1e293b,#334155)',color:'#fff',marginBottom:20,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',right:-40,top:-40,width:200,height:200,background:'radial-gradient(circle,rgba(244,129,32,.15),transparent 70%)',borderRadius:'50%'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12,position:'relative'}}>
        <div><div style={{fontSize:13,opacity:.75,marginBottom:4}}>{activeMonth==='current'?`${NOW_MONTH} ${NOW_YEAR} Summary`:'All-Time Summary'}</div><div className="stat-number" style={{fontSize:48,fontWeight:800,letterSpacing:'-2px',lineHeight:1}}>${fmt$(totalSpent)}</div><div style={{fontSize:13,opacity:.75,marginTop:6}}>Spent so far · Budget: ${fmt$(totalBudget)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:11,opacity:.7,marginBottom:4}}>💵 Money Saved (Float)</div><div className="stat-number" style={{fontSize:28,fontWeight:800,color:'#34d399'}}>${moneySaved.toFixed(2)}</div><div style={{fontSize:11,opacity:.7,marginTop:2}}>by staying in grace period</div></div>

      <div style={{marginBottom:16}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:12,opacity:.8}}>Budget Used</span><span style={{fontSize:12,fontWeight:700,color:totalSpent/totalBudget>1?'#f87171':totalSpent/totalBudget>.75?'#fbbf24':'#34d399'}}>{((totalSpent/totalBudget)*100).toFixed(0)}%</span></div><div style={{height:10,background:'rgba(255,255,255,.15)',borderRadius:5}}><div style={{height:'100%',width:`${Math.min((totalSpent/totalBudget)*100,100)}%`,background:totalSpent/totalBudget>1?'#f87171':totalSpent/totalBudget>.75?'#fbbf24':'#34d399',borderRadius:5,transition:'width .5s'}}/></div></div>

const ScoreBooster=({cards})=>{
  const [selectedCard,setSelectedCard]=useState(null);
  const [wizardStep,setWizardStep]=useState(0);
  const [completedSteps,setCompletedSteps]=useState([]);
  const [showStrategy,setShowStrategy]=useState('statement'); // 'statement' or 'onePercent'
  
  // Calculate 1% target for each card
  const getOnePercentTarget=(limit)=>Math.ceil(limit*0.01);
  
  // Calculate pay-by date (3-4 days before statement close)
  const getPayByDate=(card)=>{
    const cy=calcCycle(card.cd,card.dd);
    return addD(cy.nc,-4); // 4 days before statement close
  };
  
  // Calculate utilization status
  const getUtilStatus=(cards)=>{
    const totalLimit=cards.reduce((s,c)=>s+c.limit,0);
    const totalBal=cards.reduce((s,c)=>s+c.bal,0);
    const util=totalLimit?(totalBal/totalLimit)*100:0;
    return{util,totalLimit,totalBal,status:util<10?'excellent':util<30?'good':'high'};
  };
  
  const utilStatus=getUtilStatus(cards);
  
  // Wizard steps
  const WIZARD_STEPS=[
    {id:1,title:'Find Statement Dates',desc:'Locate your statement closing date (NOT due date) in your bank app or PDF statement.',icon:'📅',action:'I found my dates'},
    {id:2,title:'Set Payment Reminder',desc:'Set a reminder 3-4 days BEFORE your statement closing date.',icon:'⏰',action:'Reminder set'},
    {id:3,title:'Choose Your 1% Card',desc:'Pick ONE card to leave ~1% balance on. Pay all others to $0.',icon:'💳',action:'Card selected'},
    {id:4,title:'Make Strategic Payment',desc:'Pay cards down so only ~1% remains on your chosen card.',icon:'💸',action:'Payment made'},
    {id:5,title:'Set Up Autopay',desc:'Enable autopay to pay the final small balance by due date.',icon:'🔄',action:'Autopay enabled'},
  ];
  
  const toggleStep=(stepId)=>{
    setCompletedSteps(prev=>prev.includes(stepId)?prev.filter(s=>s!==stepId):[...prev,stepId]);
  };
  
  const progressPct=(completedSteps.length/WIZARD_STEPS.length)*100;
  
  // Impact calculator
  const potentialScoreIncrease=utilStatus.util>30?Math.round((utilStatus.util-10)*0.8):utilStatus.util>10?Math.round((utilStatus.util-5)*0.5):0;
  
  return<div className="fade-in">

        <div style={{background:'rgba(255,255,255,.15)',backdropFilter:'blur(10px)',borderRadius:16,padding:20,textAlign:'center'}}>
          <div style={{fontSize:12,opacity:.8,marginBottom:4}}>Current Utilization</div>
          <div className="stat-number" style={{fontSize:32,fontWeight:800,color:utilStatus.status==='excellent'?'#fff':utilStatus.status==='good'?'#fef3c7':'#fee2e2'}}>{utilStatus.util.toFixed(1)}%</div>
          <div style={{fontSize:11,marginTop:4,opacity:.9}}>{utilStatus.status==='excellent'?'🌟 Excellent!':utilStatus.status==='good'?'👍 Good':' Needs improvement'}</div>
        </div>

        {WIZARD_STEPS.map((step,idx)=>{
          const isComplete=completedSteps.includes(step.id);
          const isCurrent=!isComplete&&completedSteps.length===idx;
          return<div key={step.id} onClick={()=>toggleStep(step.id)} style={{display:'flex',alignItems:'center',gap:16,padding:16,background:isComplete?'rgba(16,185,129,.08)':isCurrent?C.primaryLight:'var(--glass)',border:`1px solid ${isComplete?'rgba(16,185,129,.3)':isCurrent?'rgba(244,129,32,.3)':'var(--border)'}`,borderRadius:14,cursor:'pointer',transition:'all .2s'}}>
            <div style={{width:44,height:44,borderRadius:12,background:isComplete?'linear-gradient(135deg,#10b981,#059669)':isCurrent?'linear-gradient(135deg,#F48120,#FAAE40)':'var(--surface)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:isComplete?20:22,color:isComplete||isCurrent?'#fff':C.muted,fontWeight:700,boxShadow:isComplete||isCurrent?'0 4px 12px rgba(0,0,0,.15)':'none'}}>
              {isComplete?'✓':step.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600,color:isComplete?C.success:C.dark,marginBottom:2}}>Step {step.id}: {step.title}</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.4}}>{step.desc}</div>
            </div>
            <div style={{fontSize:12,fontWeight:600,color:isComplete?C.success:isCurrent?C.primary:C.muted,padding:'6px 12px',background:isComplete?'rgba(16,185,129,.1)':isCurrent?'rgba(244,129,32,.1)':'var(--surface)',borderRadius:20}}>
              {isComplete?'Done ✓':isCurrent?'Do Now':step.action}
            </div>
          </div>
        })}
      </div>
    </div>
    
    {/* My Cards - Payment Scheduler & 1% Calculator */}
    <div className="section-card" style={{marginBottom:28}}>
      <SecHead t="💳 Smart Payment Scheduler"/>
      <p style={{fontSize:13,color:C.muted,marginBottom:20,marginTop:-8}}>See exactly when to pay each card and how much to leave</p>
      
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {cards.map(card=>{
          const cy=calcCycle(card.cd,card.dd);
          const payByDate=getPayByDate(card);
          const daysUntilPayBy=daysB(TODAY,payByDate);
          const onePercentTarget=getOnePercentTarget(card.limit);
          const isSelected=selectedCard===card.id;
          const payDownAmount=Math.max(0,card.bal-onePercentTarget);
          const cardDef=CARDS[card.cardType]||CARDS.chase_sapphire_preferred;
          const isUrgent=daysUntilPayBy<=3&&daysUntilPayBy>=0;
          const isPast=daysUntilPayBy<0;
          
          return<div key={card.id} style={{background:'var(--glass)',border:`1px solid ${isUrgent?'rgba(239,68,68,.4)':isSelected?'rgba(244,129,32,.4)':'var(--border)'}`,borderRadius:16,overflow:'hidden'}}>
            {/* Card Header */}
            <div onClick={()=>setSelectedCard(isSelected?null:card.id)} style={{padding:16,display:'flex',alignItems:'center',gap:16,cursor:'pointer',background:isUrgent?'rgba(239,68,68,.05)':isSelected?C.primaryLight:'transparent'}}>
              <MiniCard type={card.cardType} last={card.last}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:C.dark}}>{cardDef.name}</div>
                <div style={{fontSize:12,color:C.muted}}>••••{card.last} • Limit ${card.limit.toLocaleString()}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:isUrgent?C.danger:daysUntilPayBy<=7?C.warning:C.muted,fontWeight:600}}>
                  {isPast?'Statement closed':`Pay by ${fmtD(payByDate)}`}
                </div>
                <div style={{fontSize:18,fontWeight:700,color:isUrgent?C.danger:daysUntilPayBy<=7?C.warning:C.success}}>
                  {isPast?'—':`${daysUntilPayBy} days`}
                </div>
              </div>
              <div style={{fontSize:20,color:C.muted,transform:isSelected?'rotate(180deg)':'rotate(0)',transition:'transform .2s'}}>▾</div>
            </div>
            
            {/* Expanded Details */}
            {isSelected&&<div style={{borderTop:`1px solid ${C.border}`,padding:20,background:'var(--surface)'}}>
              <div className="grid-2" style={{gap:16,marginBottom:20}}>
                {/* Statement Date Info */}
                <div style={{background:'linear-gradient(135deg,rgba(59,130,246,.1),rgba(59,130,246,.05))',border:'1px solid rgba(59,130,246,.2)',borderRadius:14,padding:16}}>
                  <div style={{fontSize:11,color:C.info,fontWeight:600,marginBottom:8}}>📅 STATEMENT CLOSES</div>
                  <div className="stat-number" style={{fontSize:24,fontWeight:800,color:C.dark}}>{fmtD(cy.nc)}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:4}}>In {cy.uc} days • Day {card.cd} of month</div>
                  <div style={{marginTop:12,padding:10,background:'rgba(59,130,246,.1)',borderRadius:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:C.info}}>⏰ Pay 3-4 days before:</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.dark,marginTop:2}}>{fmtD(payByDate)}</div>
                  </div>
                </div>
                
                {/* 1% Rule Calculator */}
                <div style={{background:'linear-gradient(135deg,rgba(139,92,246,.1),rgba(139,92,246,.05))',border:'1px solid rgba(139,92,246,.2)',borderRadius:14,padding:16}}>
                  <div style={{fontSize:11,color:C.purple,fontWeight:600,marginBottom:8}}>🎯 1% RULE TARGET</div>
                  <div className="stat-number" style={{fontSize:24,fontWeight:800,color:C.dark}}>${onePercentTarget}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:4}}>Leave this on card (1% of ${card.limit.toLocaleString()})</div>
                  <div style={{marginTop:12,padding:10,background:'rgba(139,92,246,.1)',borderRadius:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:C.purple}}>💸 Pay down amount:</div>
                    <div style={{fontSize:14,fontWeight:700,color:card.bal>onePercentTarget?C.warning:C.success,marginTop:2}}>
                      {card.bal>onePercentTarget?`$${payDownAmount.toLocaleString()} to reach 1%`:'Already at/below 1% ✓'}
                    </div>
                  </div>
                </div>
              </div>
              
              {/* Current Status */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:14,background:'var(--glass)',borderRadius:12,border:`1px solid ${C.border}`}}>
                <div>
                  <div style={{fontSize:12,color:C.muted}}>Current Balance</div>
                  <div className="stat-number" style={{fontSize:20,fontWeight:700,color:C.dark}}>${card.bal.toLocaleString()}</div>
                </div>
                <div style={{fontSize:24}}>→</div>
                <div>
                  <div style={{fontSize:12,color:C.muted}}>Target Balance</div>
                  <div className="stat-number" style={{fontSize:20,fontWeight:700,color:C.success}}>${onePercentTarget}</div>
                </div>
                <div style={{fontSize:24}}>→</div>
                <div>
                  <div style={{fontSize:12,color:C.muted}}>Utilization</div>
                  <div className="stat-number" style={{fontSize:20,fontWeight:700,color:C.success}}>1%</div>
                </div>
              </div>
              
              {/* Action Buttons */}
              <div style={{display:'flex',gap:10,marginTop:16}}>
                <button className="btn-ghost" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}} onClick={()=>{
                  // In a real app, this would integrate with calendar
                  alert(`Reminder set for ${fmtFull(payByDate)}!\n\nPay ${cardDef.name} down to $${onePercentTarget} before statement closes.`);
                }}>
                  <span>📅</span> Add to Calendar
                </button>
                <button className="btn-primary" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <span>💸</span> Pay ${payDownAmount>0?payDownAmount.toLocaleString():'0'} Now
                </button>
              </div>
            </div>}
          </div>
        })}
      </div>
    </div>
    
    {/* Overall Utilization Tracker */}
    <div className="section-card" style={{marginBottom:28}}>
      <SecHead t="📊 Utilization Tracker"/>
      <div className="grid-3" style={{gap:16}}>
        <div style={{background:utilStatus.util<10?'linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.05))':utilStatus.util<30?'linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05))':'linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05))',border:`1px solid ${utilStatus.util<10?'rgba(16,185,129,.3)':utilStatus.util<30?'rgba(245,158,11,.3)':'rgba(239,68,68,.3)'}`,borderRadius:16,padding:20,textAlign:'center'}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Current Utilization</div>
          <div className="stat-number" style={{fontSize:36,fontWeight:800,color:utilStatus.util<10?C.success:utilStatus.util<30?C.warning:C.danger}}>{utilStatus.util.toFixed(1)}%</div>
          <div style={{fontSize:12,marginTop:6,color:utilStatus.util<10?C.success:utilStatus.util<30?C.warning:C.danger,fontWeight:600}}>
            {utilStatus.util<10?'🌟 Excellent':utilStatus.util<30?'👍 Good':'⚠️ Too High'}
          </div>
        </div>
        
        <div style={{background:'var(--glass)',border:`1px solid ${C.border}`,borderRadius:16,padding:20,textAlign:'center'}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Total Balance</div>
          <div className="stat-number" style={{fontSize:28,fontWeight:800,color:C.dark}}>${utilStatus.totalBal.toLocaleString()}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:6}}>across {cards.length} cards</div>
        </div>
        
        <div style={{background:'var(--glass)',border:`1px solid ${C.border}`,borderRadius:16,padding:20,textAlign:'center'}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Total Credit Limit</div>
          <div className="stat-number" style={{fontSize:28,fontWeight:800,color:C.dark}}>${utilStatus.totalLimit.toLocaleString()}</div>
          <div style={{fontSize:11,color:C.primary,marginTop:6,fontWeight:500}}>Request limit increases!</div>
        </div>
      </div>
      
      {/* Visual utilization bar */}
      <div style={{marginTop:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:12,color:C.muted}}>Utilization Range</span>
          <span style={{fontSize:12,color:C.muted}}>Goal: Under 10%</span>
        </div>
        <div style={{height:24,background:'var(--border)',borderRadius:12,position:'relative',overflow:'hidden'}}>
          {/* Zone markers */}
          <div style={{position:'absolute',left:'10%',top:0,bottom:0,width:1,background:'rgba(16,185,129,.5)'}}/>
          <div style={{position:'absolute',left:'30%',top:0,bottom:0,width:1,background:'rgba(245,158,11,.5)'}}/>
          {/* Current position */}
          <div style={{position:'absolute',left:`${Math.min(utilStatus.util,100)}%`,top:'50%',transform:'translate(-50%,-50%)',width:20,height:20,background:utilStatus.util<10?C.success:utilStatus.util<30?C.warning:C.danger,borderRadius:'50%',border:'3px solid #fff',boxShadow:'0 2px 8px rgba(0,0,0,.2)',zIndex:10}}/>
          {/* Labels */}
          <div style={{position:'absolute',left:'5%',top:'50%',transform:'translateY(-50%)',fontSize:10,fontWeight:600,color:C.success}}>0-10%</div>
          <div style={{position:'absolute',left:'20%',top:'50%',transform:'translateY(-50%)',fontSize:10,fontWeight:600,color:C.warning}}>10-30%</div>
          <div style={{position:'absolute',left:'60%',top:'50%',transform:'translateY(-50%)',fontSize:10,fontWeight:600,color:C.danger}}>30%+</div>
        </div>
      </div>
    </div>
    
    {/* Educational Tooltips */}
    <div className="grid-2" style={{gap:20}}>
      <div className="section-card" style={{margin:0,background:'linear-gradient(135deg,rgba(59,130,246,.05),rgba(59,130,246,.02))'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <div style={{width:40,height:40,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📅</div>
          <div style={{fontSize:16,fontWeight:700,color:C.dark}}>Statement Date Strategy</div>
        </div>
        <div style={{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:12}}>
          Credit bureaus take a "snapshot" of your balance on the <strong>statement closing date</strong>, not the due date. This reported balance determines your utilization ratio.
        </div>
        <div style={{background:'rgba(59,130,246,.1)',padding:12,borderRadius:10,fontSize:12,color:C.info}}>
          <strong>Pro Tip:</strong> Pay 3-4 days early to ensure payment posts before the snapshot. Processing can take 1-2 business days!
        </div>
      </div>
      
      <div className="section-card" style={{margin:0,background:'linear-gradient(135deg,rgba(139,92,246,.05),rgba(139,92,246,.02))'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <div style={{width:40,height:40,background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🎯</div>
          <div style={{fontSize:16,fontWeight:700,color:C.dark}}>The 1% Rule</div>
        </div>
        <div style={{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:12}}>
          People with 800+ scores often leave exactly <strong>1% balance on ONE card</strong> and pay all others to $0. This shows active credit use while keeping utilization minimal.
        </div>
        <div style={{background:'rgba(139,92,246,.1)',padding:12,borderRadius:10,fontSize:12,color:C.purple}}>
          <strong>Pro Tip:</strong> Pay the remaining 1% by the actual due date so you never pay interest!
        </div>
      </div>
    </div>
    
    {/* Bonus Tips */}
    <div className="section-card" style={{marginTop:28,background:'linear-gradient(135deg,rgba(244,129,32,.05),rgba(244,129,32,.02))'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style={{fontSize:28}}>🏆</div>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.dark}}>Bonus: Request Credit Limit Increases</div>
          <div style={{fontSize:13,color:C.muted}}>The easiest way to lower utilization without changing spending</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
        {[
          {icon:'📞',tip:'Call every 6 months to request increases'},
          {icon:'💳',tip:'Most issuers offer online CLI requests'},
          {icon:'📈',tip:'Higher limits = lower utilization ratio'},
          {icon:'🎯',tip:'Soft pull requests won\'t hurt your score'},
        ].map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:12,background:'rgba(244,129,32,.08)',borderRadius:10}}>
          <span style={{fontSize:20}}>{t.icon}</span>
          <span style={{fontSize:12,color:C.text}}>{t.tip}</span>
        </div>)}
      </div>
    </div>
  </div>;
};

// ============================================================
//  MAIN APP
// ============================================================
function App(){
  const[cards,setCards]=useState(DEMO);
  const[tab,setTab]=useState('dashboard');
  const[showAdd,setShowAdd]=useState(false);
  const[editCard,setEditCard]=useState(null);
  const[action,setAction]=useState(null); // {type, card}
  const[fico]=useState(742);
  const[darkMode,setDarkMode]=useState(false);

  useEffect(()=>{
    document.body.className=darkMode?'dark':'';
  },[darkMode]);

  const handleSave=useCallback(c=>{
    setCards(prev=>prev.some(p=>p.id===c.id)?prev.map(p=>p.id===c.id?c:p):[...prev,c]);
    setShowAdd(false);setEditCard(null);
  },[]);

  const handleAction=useCallback((type,card)=>{
    setAction({type,card});
  },[]);

  return<div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar tab={tab} setTab={setTab} onAdd={()=>setShowAdd(true)} darkMode={darkMode} setDarkMode={setDarkMode}/>
    <main className="main-content" style={{flex:1,marginLeft:260,padding:'36px 40px',minHeight:'100vh',paddingBottom:100,maxWidth:1200}}>
      {tab==='dashboard'&&<Dashboard cards={cards} setTab={setTab} fico={fico} onAdd={()=>setShowAdd(true)}/>}
      {tab==='float'&&<FloatPage cards={cards} onAction={handleAction}/>}
      {tab==='cards'&&<CardVault cards={cards} onAdd={()=>setShowAdd(true)} onEdit={c=>{setEditCard(c);}}/>}
      {tab==='scorebooster'&&<ScoreBooster cards={cards}/>}
      {tab==='optimizer'&&<SpendOptimizer cards={cards}/>}
      {tab==='interest'&&<InterestPage cards={cards}/>}
      {tab==='fico'&&<FicoPage cards={cards} fico={fico}/>}
      {tab==='rule72'&&<Rule72Page/>}
      {tab==='floatstrategy'&&<FloatStrategyPage cards={cards}/>}
      {tab==='planner'&&<SpendingPlanner cards={cards} setTab={setTab}/>}
      {tab==='timeline'&&<Timeline cards={cards}/>}
      {tab==='settings'&&<Settings darkMode={darkMode} setDarkMode={setDarkMode}/>}
    </main>
    <BottomNav tab={tab} setTab={setTab}/>
    {(showAdd||editCard)&&<CardModal onClose={()=>{setShowAdd(false);setEditCard(null);}} onSave={handleSave} existing={editCard}/>}
    {action&&<ActionModal type={action.type} card={action.card} onClose={()=>setAction(null)}/>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
